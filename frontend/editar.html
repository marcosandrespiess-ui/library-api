<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Livro</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <h1>[ MINHA BIBLIOTECA ]</h1>
        <span class="header-coins">EDITAR LIVRO</span>
        <a href="index.html" class="btn-novo">← VOLTAR</a>
    </header>

    <nav>
        <a href="index.html" class="nav-item">TODOS</a>
    </nav>

    <main>
        <div class="form-container">
            <div class="form-card">
                <h2>&gt; EDITAR LIVRO_</h2>
                <form id="form-editar">
                    <div class="campo">
                        <label>TITULO</label>
                        <input type="text" id="titulo" required>
                    </div>
                    <div class="campo">
                        <label>AUTOR</label>
                        <input type="text" id="autor" required>
                    </div>
                    <div class="campo">
                        <label>ANO</label>
                        <input type="number" id="ano" min="1" max="2026" required>
                    </div>
                    <div class="campo">
                        <label>GENERO</label>
                        <select id="genero" required>
                            <option value="">-- SELECIONE --</option>
                            <option value="Fantasia">FANTASIA</option>
                            <option value="Ficcao">FICCAO</option>
                            <option value="Terror">TERROR</option>
                            <option value="Romance">ROMANCE</option>
                            <option value="Aventura">AVENTURA</option>
                            <option value="Misterio">MISTERIO</option>
                            <option value="Historia">HISTORIA</option>
                            <option value="Biografia">BIOGRAFIA</option>
                            <option value="Ciencia">CIENCIA</option>
                            <option value="Outro">OUTRO</option>
                        </select>
                    </div>
                    <div class="campo">
                        <label>PAGINAS</label>
                        <input type="number" id="paginas" min="1" required>
                    </div>
                    <div class="campo">
                        <label>EDITORA</label>
                        <input type="text" id="editora" required>
                    </div>
                    <div class="campo">
                        <label>EDICAO</label>
                        <input type="number" id="edicao" min="1" required>
                    </div>
                    <div id="mensagem"></div>
                    <button type="submit" class="btn-salvar">SALVAR ALTERACOES &gt;&gt;</button>
                </form>
            </div>
        </div>
    </main>

    <footer>BIBLIOTECA v1.0 &nbsp;|&nbsp; COPYRIGHT 2026 &nbsp;|&nbsp; INSERT COIN</footer>

    <script src="js/api.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const id = params.get("id");

        async function carregarLivro() {
            if (!id) {
                window.location.href = "index.html";
                return;
            }
            const livro = await buscarLivro(id);
            document.getElementById("titulo").value  = livro.titulo;
            document.getElementById("autor").value   = livro.autor;
            document.getElementById("ano").value     = livro.ano;
            document.getElementById("genero").value  = livro.genero;
            document.getElementById("paginas").value = livro.paginas;
            document.getElementById("editora").value = livro.editora;
            document.getElementById("edicao").value  = livro.edicao;
        }

        document.getElementById("form-editar").addEventListener("submit", async (e) => {
            e.preventDefault();

            const dados = {
                titulo:  document.getElementById("titulo").value,
                autor:   document.getElementById("autor").value,
                ano:     parseInt(document.getElementById("ano").value),
                genero:  document.getElementById("genero").value,
                paginas: parseInt(document.getElementById("paginas").value),
                editora: document.getElementById("editora").value,
                edicao:  parseInt(document.getElementById("edicao").value)
            };

            const resultado = await atualizarLivro(id, dados);
            const mensagem = document.getElementById("mensagem");

            if (resultado.id) {
                mensagem.className = "sucesso";
                mensagem.textContent = ">> LIVRO ATUALIZADO!";
                setTimeout(() => window.location.href = "index.html", 1500);
            } else {
                mensagem.className = "erro-msg";
                mensagem.textContent = ">> ERRO! TENTE NOVAMENTE.";
            }
        });

        carregarLivro();
    </script>

</body>
</html>
